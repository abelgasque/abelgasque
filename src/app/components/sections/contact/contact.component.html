<div class="container">
  <!-- section title -->
  <h2 class="section-title wow fadeInUp">Entre em Contato</h2>

  <div class="spacer-60"></div>

  <div class="row">
    <div class="col-md-4">
      <!-- contact info -->
      <div class="contact-info">
        <h3 class="wow fadeInUp">Vamos conversar!</h3>
        <p class="wow fadeInUp">
          Não gosta de formulários? Me envie um 
          <a href="mailto:abelgasque20@gmail.com">e-mail</a>. 👋
        </p>
      </div>
    </div>

    <div class="col-md-8">
      <!-- Contact Form -->
      <form id="contact-form" class="contact-form mt-6" method="post" action="javascript:">
        <div class="messages"></div>

        <div class="row">
          <div class="column col-md-6">
            <!-- Name input -->
            <div class="form-group">
              <input type="text" class="form-control" name="InputName" id="InputName" 
                     placeholder="Seu nome" required="required" 
                     data-error="O nome é obrigatório." />
              <div class="help-block with-errors"></div>
            </div>
          </div>

          <div class="column col-md-6">
            <!-- Email input -->
            <div class="form-group">
              <input type="email" class="form-control" id="InputEmail" name="InputEmail" 
                     placeholder="Seu e-mail" required="required" 
                     data-error="O e-mail é obrigatório." />
              <div class="help-block with-errors"></div>
            </div>
          </div>

          <div class="column col-md-12">
            <!-- Subject input -->
            <div class="form-group">
              <input type="text" class="form-control" id="InputSubject" name="InputSubject" 
                     placeholder="Assunto" required="required" 
                     data-error="O assunto é obrigatório." />
              <div class="help-block with-errors"></div>
            </div>
          </div>

          <div class="column col-md-12">
            <!-- Message input -->
            <div class="form-group">
              <textarea name="InputMessage" id="InputMessage" class="form-control" rows="5" 
                        placeholder="Mensagem" required="required" 
                        data-error="A mensagem é obrigatória."></textarea>
              <div class="help-block with-errors"></div>
            </div>
          </div>

          <div class="column col-md-12">
            <button type="submit" name="submit" id="submit" value="Submit" class="btn btn-default">
              Enviar Mensagem
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
